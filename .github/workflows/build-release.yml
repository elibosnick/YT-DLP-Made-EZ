name: Build & Release

# Tag a release to build installers for every platform:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Produces: .msi + .exe (Windows x64), .dmg (macOS Intel and Apple Silicon),
# .AppImage (Linux x64), and the signed `latest.json` the in-app updater reads.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Fast feedback: fails a broken PR in under a minute rather than after a
  # 20-minute matrix build. The core crate has no GUI dependencies, so it needs
  # none of the system packages the bundle job installs.
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci
      - name: Frontend tests
        run: npm run test

      - name: Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Core logic tests
        run: cargo test --manifest-path src-tauri/core/Cargo.toml

      - name: Lint core logic
        run: cargo clippy --manifest-path src-tauri/core/Cargo.toml -- -D warnings

  build:
    needs: test
    strategy:
      # Never cancel siblings: a macOS-only failure should not throw away a
      # perfectly good Windows installer that took 15 minutes to produce.
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS (Apple Silicon)
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS (Intel)
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux (x64)
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows (x64)

    runs-on: ${{ matrix.platform }}
    name: ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      # Tauri links against the system webview. On Linux that means webkit2gtk;
      # macOS and Windows provide theirs with the OS.
      # Pinned to ubuntu-22.04 because 24.04 ships webkit2gtk 4.1 with an soname
      # that older distros do not carry, which would narrow who can run the AppImage.
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required for the in-app updater to accept the bundle. Generate once with
          # `npm run tauri signer generate` and store both halves as repo secrets.
          # Without these the build still succeeds, but auto-update will reject every
          # release it is offered — so the failure shows up later, in the wild.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # --- macOS code signing / notarization -------------------------------
          # On the macOS runners these enable Developer ID signing + notarization, so a
          # downloaded build opens with no Gatekeeper warning. They're empty (and simply
          # ignored) on the Windows/Linux runners, so this block is safe for all targets.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: "YT-DLP Made EZ ${{ github.ref_name }}"
          releaseBody: |
            **YT-DLP Made EZ** — a simple, private video downloader. Paste a link, pick a format, click Download. Everything runs on your computer: no accounts, no ads, no tracking.

            ### Download the file for your computer
            - **Mac (Apple Silicon — M1/M2/M3/M4):** the `aarch64.dmg`
            - **Mac (Intel):** the `x64.dmg`
            - **Windows:** the `x64-setup.exe`
            - **Linux:** the `.AppImage`

            ### Opening it on a Mac the first time
            This app is free and isn't signed with a paid Apple certificate, so macOS warns you the first time. Open the `.dmg`, drag the app into your **Applications** folder, then:

            1. In **Applications**, double-click **YT-DLP Made EZ**.
            2. If macOS says it can't verify the developer, click **Done**.
            3. Open **System Settings → Privacy & Security**, scroll to the **Security** section, and click **Open Anyway** next to YT-DLP Made EZ. Confirm with your password or Touch ID. (You only do this once.)

            **If macOS instead says the app is "damaged":** that's just an over-cautious flag on unsigned apps, not a real problem. Open the **Terminal** app (in Applications → Utilities), paste the line below exactly, press Return, then open the app normally:
            ```
            xattr -dr com.apple.quarantine "/Applications/YT-DLP Made EZ.app"
            ```

            The very first launch also takes a minute to set itself up (it downloads its helper tools). That's normal and only happens once.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
